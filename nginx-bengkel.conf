# ── Konfigurasi Server Block Nginx untuk Inventaris Bengkel ──
# Sistem Operasi : Ubuntu Linux 22.04 / 24.04 LTS
# Web Server     : Nginx
# PHP Version    : PHP 8.3 (PHP-FPM)
# Framework      : Laravel 11

server {
    listen 80;
    listen [::]:80;
    
    # Ganti dengan nama domain atau IP server Anda
    server_name inventaris-bengkel.my.id www.inventaris-bengkel.my.id;

    # Document Root wajib mengarah ke folder /public Laravel
    root /var/www/bengkel/public;
    index index.php index.html index.htm;

    # ── Security Hardening ─────────────────────────────────────────────
    # Sembunyikan versi Nginx pada header HTTP dan error page
    server_tokens off;

    # Batasi ukuran maksimal upload file (misalnya export/import atau lampiran)
    client_max_body_size 20M;

    # HTTP Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Routing Utama Laravel ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Konfigurasi PHP-FPM 8.3 ────────────────────────────────────────
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # Pastikan path socket PHP-FPM 8.3 sesuai dengan lingkungan server
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ── Blokir Akses ke File Sensitif & Tersembunyi ────────────────────
    # Tolak akses ke file .env, .git, .htaccess, dll.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tolak akses langsung ke file markdown dan log
    location ~* \.(md|log|ini|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Caching File Statis (CSS, JS, Gambar, Font) ────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Log Akses & Error ──────────────────────────────────────────────
    access_log /var/log/nginx/bengkel-access.log;
    error_log /var/log/nginx/bengkel-error.log warn;
}
